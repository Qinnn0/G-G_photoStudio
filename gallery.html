<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>G&G Auto Drive Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:#fff;
}

header{
padding:20px;
text-align:center;
background:#000;
position:sticky;
top:0;
}

h1{
color:#ffd700;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#1b1b1b;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card p{
padding:10px;
text-align:center;
}

.loading{
text-align:center;
padding:40px;
color:#ccc;
}
</style>
</head>

<body>

<header>
<h1>G&G Auto Google Drive Gallery</h1>
<p>Images load automatically from Drive folder</p>
</header>

<div class="loading" id="loading">Loading photos...</div>
<div class="gallery" id="gallery"></div>

<script>
// 🔧 YOUR SETTINGS HERE
const API_KEY = "YOUR_GOOGLE_DRIVE_API_KEY";
const FOLDER_ID = "YOUR_FOLDER_ID";

// Google Drive API URL
const url =
`https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`;

// Fetch files
fetch(url)
.then(res => res.json())
.then(data => {
    const gallery = document.getElementById("gallery");
    document.getElementById("loading").style.display = "none";

    data.files.forEach(file => {

        // Only images
        if(file.mimeType.includes("image")){

            const imgUrl =
            `https://drive.google.com/uc?export=view&id=${file.id}`;

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${imgUrl}">
                <p>${file.name}</p>
            `;

            gallery.appendChild(div);
        }
    });
})
.catch(err => {
    document.getElementById("loading").innerText =
    "Failed to load images. Check API key or folder permissions.";
    console.error(err);
});
</script>

</body>
</html>
